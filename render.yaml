# Render.com blueprint for the LinguaHaru Web app (FastAPI).
#
# On Render the RENDER env var is always set, so server_mode_on() is True
# automatically: the app binds 0.0.0.0:$PORT, hides the key/model/admin UI, and
# uses the server's own key. Set LINGUAHARU_API_KEY (secret) in the dashboard,
# and make sure config/system_config.json has default_online=true with a
# default_online_model the key belongs to.
services:
  - type: web
    name: linguaharu
    runtime: python
    plan: free
    buildCommand: pip install -r requirements/base.txt -r requirements/web.txt
    startCommand: python -m webapp.server
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: LINGUAHARU_API_KEY
        sync: false   # set as a secret in the Render dashboard
