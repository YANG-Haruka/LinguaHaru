[pytest]
# Only collect THIS repo's tests. Without this, running pytest from the root also
# collected third-party tests under data/_bench (bundled embeddable-python /
# portable builds) and dist*, which fail/pollute the run.
testpaths = tests
norecursedirs = data dist dist_portable build .git __pycache__ .playwright-mcp *.egg-info
addopts = -p no:cacheprovider
